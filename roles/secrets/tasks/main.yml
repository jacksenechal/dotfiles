---
- name: Derive Bitwarden Secrets Manager CLI architecture
  ansible.builtin.set_fact:
    dotfiles_secrets_bws_asset_arch: >-
      {{ dotfiles_secrets_bws_asset_arch_map[ansible_facts['architecture']] | default('') }}

- name: Validate supported CPU architecture for bws
  ansible.builtin.assert:
    that:
      - dotfiles_secrets_bws_asset_arch | length > 0
    fail_msg: >-
      Unsupported architecture '{{ ansible_facts['architecture'] }}' for Bitwarden Secrets Manager CLI.
      Supported architectures: {{ dotfiles_secrets_bws_asset_arch_map.keys() | list | join(', ') }}

- name: Ensure local directories for Bitwarden sync exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ ansible_facts['env']['HOME'] }}/.local/bin", mode: '0755' }
    - { path: "{{ dotfiles_secrets_bws_cache_dir }}", mode: '0700' }
    - { path: "{{ ansible_facts['env']['HOME'] }}/.config/bitwarden-sm", mode: '0700' }
    - { path: "{{ ansible_facts['env']['HOME'] }}/.ssh", mode: '0700' }
    - { path: "{{ ansible_facts['env']['HOME'] }}/.config/keys", mode: '0700' }

- name: Resolve Bitwarden access token candidates
  ansible.builtin.set_fact:
    dotfiles_secrets_bws_access_token_candidates: >-
      {{
        [dotfiles_secrets_bws_access_token_file]
        if dotfiles_secrets_bws_access_token_file | length > 0
        else dotfiles_secrets_bws_access_token_file_candidates
      }}

- name: Check for Bitwarden access token files
  ansible.builtin.stat:
    path: "{{ item }}"
  loop: "{{ dotfiles_secrets_bws_access_token_candidates }}"
  register: dotfiles_secrets_bws_access_token_candidate_stats

- name: Select Bitwarden access token file
  ansible.builtin.set_fact:
    dotfiles_secrets_bws_access_token_file_resolved: >-
      {{
        (
          dotfiles_secrets_bws_access_token_candidate_stats.results
          | selectattr('stat.exists')
          | map(attribute='item')
          | list
          | first
        ) | default('')
      }}

- name: Fail when Bitwarden access token file is missing
  ansible.builtin.fail:
    msg: |
      No Bitwarden Secrets Manager access token was found.

      Recommended location:
        ~/.config/bitwarden-sm/access-token

      Backward-compatible fallback location:
        ~/.config/keys/BWS_ACCESS_TOKEN

      Recommended Bitwarden setup:
      1. Create a Machine Account for this machine in the Bitwarden UI.
      2. Grant it read/write access to the 'dotfiles' project.
      3. Save the access token in ~/.config/bitwarden-sm/access-token with mode 0600.
      4. Re-run this playbook.
    
  when: dotfiles_secrets_bws_access_token_file_resolved | length == 0

- name: Download Bitwarden Secrets Manager CLI archive
  ansible.builtin.get_url:
    url: >-
      https://github.com/bitwarden/sdk-sm/releases/download/bws-v{{ dotfiles_secrets_bws_version }}/bws-{{ dotfiles_secrets_bws_asset_arch }}-unknown-linux-gnu-{{ dotfiles_secrets_bws_version }}.zip
    dest: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}.zip"
    mode: '0600'
    timeout: 120

- name: Ensure Bitwarden CLI extraction directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}"
    state: directory
    mode: '0700'

- name: Extract Bitwarden Secrets Manager CLI
  ansible.builtin.unarchive:
    src: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}.zip"
    dest: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}"
    remote_src: true
    creates: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}/bws"

- name: Install Bitwarden Secrets Manager CLI binary
  ansible.builtin.copy:
    src: "{{ dotfiles_secrets_bws_cache_dir }}/bws-{{ dotfiles_secrets_bws_version }}-{{ dotfiles_secrets_bws_asset_arch }}/bws"
    dest: "{{ dotfiles_secrets_bws_path }}"
    mode: '0755'
    remote_src: true

- name: Optionally configure Bitwarden server base
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_secrets_bws_path }}"
      - config
      - server-base
      - "{{ dotfiles_secrets_bws_server_base }}"
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"
  when: dotfiles_secrets_bws_server_base | length > 0
  changed_when: true

- name: Read Bitwarden access token file
  ansible.builtin.slurp:
    path: "{{ dotfiles_secrets_bws_access_token_file_resolved }}"
  register: dotfiles_secrets_bws_access_token_raw
  no_log: true

- name: Set Bitwarden access token fact
  ansible.builtin.set_fact:
    dotfiles_secrets_bws_access_token: "{{ dotfiles_secrets_bws_access_token_raw['content'] | b64decode | trim }}"
  no_log: true

- name: Verify bws CLI is available
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_secrets_bws_path }}"
      - --version
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"
  changed_when: false

- name: List Bitwarden projects
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_secrets_bws_path }}"
      - project
      - list
      - --output
      - json
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"
    BWS_ACCESS_TOKEN: "{{ dotfiles_secrets_bws_access_token }}"
  register: dotfiles_secrets_bws_projects_result
  changed_when: false
  no_log: true

- name: Extract dotfiles project id
  ansible.builtin.set_fact:
    dotfiles_secrets_project_id: >-
      {{
        (
          dotfiles_secrets_bws_projects_result.stdout
          | from_json
          | selectattr('name', 'equalto', dotfiles_secrets_project_name)
          | map(attribute='id')
          | list
          | first
        ) | default('')
      }}
  no_log: true

- name: Fail when dotfiles Bitwarden project is unavailable
  ansible.builtin.fail:
    msg: |
      Bitwarden project '{{ dotfiles_secrets_project_name }}' is not accessible with the configured machine account.

      Create it first from a machine with write access:
        script/sync_secrets_to_bws

      Or create it manually in the Bitwarden UI and grant this machine account access.
  when: dotfiles_secrets_project_id | length == 0

- name: List dotfiles secrets from Bitwarden
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_secrets_bws_path }}"
      - secret
      - list
      - "{{ dotfiles_secrets_project_id }}"
      - --output
      - json
  environment:
    HOME: "{{ ansible_facts['env']['HOME'] }}"
    BWS_ACCESS_TOKEN: "{{ dotfiles_secrets_bws_access_token }}"
  register: dotfiles_secrets_bws_secret_list_result
  changed_when: false
  no_log: true

- name: Select file-backed dotfiles secrets
  ansible.builtin.set_fact:
    dotfiles_secrets_file_items: >-
      {{
        dotfiles_secrets_bws_secret_list_result.stdout
        | from_json
        | selectattr('key', 'match', '^file:')
        | list
      }}
  no_log: true

- name: Ensure parent directories for synced secrets exist
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/{{ (item.key | regex_replace('^file:', '')) | dirname }}"
    state: directory
    mode: >-
      {{ '0700' if (item.key | regex_replace('^file:', '')).startswith('.ssh') or (item.key | regex_replace('^file:', '')).startswith('.config/keys') else '0755' }}
  loop: "{{ dotfiles_secrets_file_items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true

- name: Write synced secrets to disk
  ansible.builtin.copy:
    dest: "{{ ansible_facts['env']['HOME'] }}/{{ item.key | regex_replace('^file:', '') }}"
    content: "{{ item.value }}"
    mode: "{{ (item.note | trim) if (item.note | default('') | trim | length > 0) else '0600' }}"
  loop: "{{ dotfiles_secrets_file_items }}"
  loop_control:
    label: "{{ item.key }}"
  no_log: true
